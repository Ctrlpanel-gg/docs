openapi: 3.0.3
info:
  title: 'CtrlPanel.gg API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: '{protocol}://{domain}'
    description: 'Your Panel Installation'
    variables:
      protocol:
        default: https
        enum:
          - http
          - https
      domain:
        default: panel.example.com
        description: 'The domain where your panel is installed'
tags:
  -
    name: Notifications
    description: ''
  -
    name: 'Product Management'
    description: ''
  -
    name: 'Role Management'
    description: ''
  -
    name: 'Server Management'
    description: ''
  -
    name: 'User Management'
    description: ''
  -
    name: 'Voucher Management'
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: ''
security:
  -
    default: []
paths:
  '/api/notifications/{user_id}':
    get:
      summary: 'Show a list of notifications for a user.'
      operationId: showAListOfNotificationsForAUser
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      type: App\Notifications\ServerCreated
                      details:
                        title: 'Server Created'
                        content: 'Your server has been created successfully.'
                      read_at: null
                      created_at: '2023-01-01 00:00:00'
                      updated_at: '2023-01-01 00:00:00'
                  meta:
                    total: 1
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        type: App\Notifications\ServerCreated
                        details:
                          title: 'Server Created'
                          content: 'Your server has been created successfully.'
                        read_at: null
                        created_at: '2023-01-01 00:00:00'
                        updated_at: '2023-01-01 00:00:00'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        type:
                          type: string
                          example: App\Notifications\ServerCreated
                        details:
                          type: object
                          properties:
                            title:
                              type: string
                              example: 'Server Created'
                            content:
                              type: string
                              example: 'Your server has been created successfully.'
                        read_at:
                          type: string
                          example: null
                          nullable: true
                        created_at:
                          type: string
                          example: '2023-01-01 00:00:00'
                        updated_at:
                          type: string
                          example: '2023-01-01 00:00:00'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 1
      tags:
        - Notifications
    delete:
      summary: 'Delete all notifications from an user.'
      operationId: deleteAllNotificationsFromAnUser
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'All notifications deleted successfully'
                  meta:
                    deleted_count: 10
                properties:
                  message:
                    type: string
                    example: 'All notifications deleted successfully'
                  meta:
                    type: object
                    properties:
                      deleted_count:
                        type: integer
                        example: 10
      tags:
        - Notifications
    parameters:
      -
        in: path
        name: user_id
        description: 'The ID of the user.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: user
        description: 'The ID of the user.'
        example: 1
        required: true
        schema:
          type: integer
  '/api/notifications/{user_id}/{notification_id}':
    get:
      summary: 'Show a specific notification of a user.'
      operationId: showASpecificNotificationOfAUser
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    type: App\Notifications\ServerCreated
                    details:
                      title: 'Server Created'
                      content: 'Your server has been created successfully.'
                    read_at: null
                    created_at: '2023-01-01 00:00:00'
                    updated_at: '2023-01-01 00:00:00'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      type:
                        type: string
                        example: App\Notifications\ServerCreated
                      details:
                        type: object
                        properties:
                          title:
                            type: string
                            example: 'Server Created'
                          content:
                            type: string
                            example: 'Your server has been created successfully.'
                      read_at:
                        type: string
                        example: null
                        nullable: true
                      created_at:
                        type: string
                        example: '2023-01-01 00:00:00'
                      updated_at:
                        type: string
                        example: '2023-01-01 00:00:00'
      tags:
        - Notifications
    delete:
      summary: 'Delete a specific notification from an user.'
      operationId: deleteASpecificNotificationFromAnUser
      description: ''
      parameters: []
      responses:
        204:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example: {  }
                properties: {  }
      tags:
        - Notifications
    parameters:
      -
        in: path
        name: user_id
        description: 'The ID of the user.'
        example: 2491fec3-c7d7-47cd-9d82-cc76e851c124
        required: true
        schema:
          type: string
      -
        in: path
        name: notification_id
        description: 'The ID of the notification.'
        example: 2491fec3-c7d7-47cd-9d82-cc76e851c124
        required: true
        schema:
          type: string
      -
        in: path
        name: user
        description: 'The ID of the user.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: notification
        description: 'The ID of the notification.'
        example: 1
        required: true
        schema:
          type: integer
  /api/notifications/send-to-users:
    post:
      summary: 'Send a notification to specific users.'
      operationId: sendANotificationToSpecificUsers
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Notification sent successfully.'
                  meta:
                    user_count: 5
                    channels:
                      - mail
                      - database
                properties:
                  message:
                    type: string
                    example: 'Notification sent successfully.'
                  meta:
                    type: object
                    properties:
                      user_count:
                        type: integer
                        example: 5
                      channels:
                        type: array
                        example:
                          - mail
                          - database
                        items:
                          type: string
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                via:
                  type: string
                  description: 'The notification channel (mail, database, both).'
                  example: both
                  enum:
                    - mail
                    - database
                    - both
                users:
                  type: array
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example:
                    - 16
                  items:
                    type: integer
                title:
                  type: string
                  description: 'The title of the notification. Must be at least 1 character.'
                  example: 'System Update'
                content:
                  type: string
                  description: 'The content of the notification. Must be at least 1 character.'
                  example: 'A new update is available.'
              required:
                - via
                - title
                - content
  /api/notifications/send-to-all:
    post:
      summary: 'Send a notification to all users.'
      operationId: sendANotificationToAllUsers
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Notification sent successfully.'
                  meta:
                    user_count: 100
                    channels:
                      - mail
                      - database
                properties:
                  message:
                    type: string
                    example: 'Notification sent successfully.'
                  meta:
                    type: object
                    properties:
                      user_count:
                        type: integer
                        example: 100
                      channels:
                        type: array
                        example:
                          - mail
                          - database
                        items:
                          type: string
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                via:
                  type: string
                  description: 'The notification channel (mail, database, both).'
                  example: both
                  enum:
                    - mail
                    - database
                    - both
                title:
                  type: string
                  description: 'The title of the notification. Must be at least 1 character.'
                  example: 'Global Message'
                content:
                  type: string
                  description: 'The content of the notification. Must be at least 1 character.'
                  example: 'Hello everyone!'
              required:
                - via
                - title
                - content
