                      created_at:
                        type: string
                        example: '2026-04-26 12:00:00'
                      updated_at:
                        type: string
                        example: '2026-04-26 12:00:00'
      tags:
        - 'Product Management'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Max 30 chars.'
                  example: 'Medium Minecraft'
                description:
                  type: string
                  description: 'Max 191 chars.'
                  example: 'Perfect for your SMP with friends'
                  nullable: true
                price:
                  type: number
                  description: 'Min 0.'
                  example: 10.0
                minimum_credits:
                  type: number
                  description: 'Min 0, must be GTE price.'
                  example: 10.0
                  nullable: true
                memory:
                  type: integer
                  description: 'Memory in MB. Use 0 for unlimited.'
                  example: 4096
                cpu:
                  type: integer
                  description: 'CPU limit in %. Use 0 for unlimited.'
                  example: 200
                swap:
                  type: integer
                  description: 'Swap in MB. Use 0 to disable, -1 for unlimited.'
                  example: 0
                disk:
                  type: integer
                  description: 'Disk in MB. Use 0 for unlimited.'
                  example: 20480
                io:
                  type: integer
                  description: 'IO limit.'
                  example: 500
                serverlimit:
                  type: integer
                  description: 'Max servers. Use 0 for unlimited.'
                  example: 1
                databases:
                  type: integer
                  description: 'Max databases.'
                  example: 3
                backups:
                  type: integer
                  description: 'Max backups.'
                  example: 2
                allocations:
                  type: integer
                  description: 'Max allocations.'
                  example: 1
                nodes:
                  type: array
                  description: 'List of node IDs associated with the product.'
                  example:
                    - 1
                    - 2
                  items:
                    type: integer
                eggs:
                  type: array
                  description: 'List of egg IDs associated with the product.'
                  example:
                    - 1
                    - 3
                  items:
                    type: integer
                disabled:
                  type: boolean
                  description: 'Whether the product is disabled.'
                  example: false
                oom_killer:
                  type: boolean
                  description: 'Whether the OOM killer is enabled.'
                  example: true
                default_billing_priority:
                  type: integer
                  description: 'The default billing priority.'
                  example: 0
                billing_period:
                  type: string
                  description: 'hourly, daily, weekly, monthly, quarterly, half-annually, annually.'
                  example: monthly
              required:
                - name
                - description
                - price
                - memory
                - cpu
                - swap
                - disk
                - io
                - serverlimit
                - databases
                - backups
                - allocations
                - billing_period
