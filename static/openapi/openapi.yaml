                        type: string
                        example: 'Perfect for your SMP with friends'
                      price:
                        type: string
                        example: '10.00'
                      memory:
                        type: integer
                        example: 4096
                      cpu:
                        type: integer
                        example: 200
                      swap:
                        type: integer
                        example: 0
                      disk:
                        type: integer
                        example: 20480
                      io:
                        type: integer
                        example: 500
                      databases:
                        type: integer
                        example: 3
                      backups:
                        type: integer
                        example: 2
                      serverlimit:
                        type: integer
                        example: 1
                      allocations:
                        type: integer
                        example: 1
                      oom_killer:
                        type: boolean
                        example: true
                      default_billing_priority:
                        type: integer
                        example: 0
                      disabled:
                        type: boolean
                        example: false
                      minimum_credits:
                        type: string
                        example: '10.00'
                      billing_period:
                        type: string
